version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: concesionario_postgres
    restart: always
    environment:
      POSTGRES_DB: concesionario_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: concesionario_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@concesionario.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - postgres

volumes:
  postgres_data: